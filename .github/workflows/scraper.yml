name: AniLit Autonomous Scraper

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs automatically every 30 minutes
  workflow_dispatch:      # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Google Chrome & Chromium Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable chromium-driver

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Headless Scraper CLI
        run: |
          python cli_scraper.py

      - name: Commit and Push Progress
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current_status.json extraction_log.json extracted_data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update extraction progress [skip ci]" && git push)
